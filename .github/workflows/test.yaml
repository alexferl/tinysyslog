name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  unit:
    strategy:
      matrix:
        go-version: [ '1.26.x' ]
        os: [ macos-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Fetch Repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run Tests
        run: go run gotest.tools/gotestsum@latest -f testname -- ./... -race -count=1 -coverprofile=coverage.txt -covermode=atomic -shuffle=on

      - name: Remove examples from coverage
        run: grep -v '/examples/' coverage.txt > coverage.filtered.txt && mv coverage.filtered.txt coverage.txt

      - name: Upload to Coveralls
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26.x' }}
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.txt
          format: golang
